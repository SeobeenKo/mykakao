<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 여백 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면 전체를 좌우로 2분할하는 플렉스 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 레이아웃: 검색 영역 + 결과 리스트 */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #dee2e6;
            z-index: 10;
        }

        /* 상단 검색바 영역 */
        .search-box {
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .search-form {
            display: flex;
            gap: 5px;
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-button {
            padding: 8px 15px;
            background-color: #fee500; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-button:hover {
            background-color: #fada0a;
        }

        /* 하단 결과 리스트 영역 (스크롤 가능) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .result-item {
            padding: 12px;
            border-bottom: 1px solid #eeeeee;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .result-item:hover {
            background-color: #e9ecef;
        }

        .place-title {
            font-weight: bold;
            color: #333333;
            font-size: 15px;
        }

        .place-address {
            font-size: 12px;
            color: #666666;
            margin-top: 4px;
        }

        /* 오른쪽 레이아웃: 지도 영역 */
        .map-container {
            flex: 1;
            height: 100%;
        }

        /* 지도 위 말풍선(인포윈도우) 디자인 */
        .info-window {
            padding: 10px;
            font-size: 13px;
            line-height: 1.4;
        }
    </style>
    <!-- 카카오 지도 스크립트 비동기 로드 설정 -->
    <script type="text/javascript" src="kakao.com"></script>
</head>
<body>

    <div class="container">
        <!-- 왼쪽: 검색창 및 결과 리스트 영역 -->
        <div class="sidebar">
            <div class="search-box">
                <form class="search-form" onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" class="search-input" placeholder="장소를 검색하세요" required>
                    <button type="submit" class="search-button">검색</button>
                </form>
            </div>
            <div id="placesList" class="result-list">
                <!-- 자바스크립트로 검색 결과를 동적으로 삽입하는 공간 -->
            </div>
        </div>

        <!-- 오른쪽: 지도 표시 영역 -->
        <div id="map" class="map-container"></div>
    </div>

    <script>
        let map;             // 카카오 지도 인스턴스 저장 변수
        let placeService;    // 카카오 장소 검색 API 서비스 객체 변수
        let markers = [];    // 생성된 마커 객체들을 저장 및 관리할 배열
        let infoWindow;      // 지도 위에 띄울 정보창(말풍선) 객체 변수

        // API 스크립트 다운로드가 완벽히 끝난 후 안전하게 초기화 실행
        kakao.maps.load(function() {
            initMap();
        });

        // 지도 생성 및 설정 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            
            // 기본 지도 옵션 설정 (초기 기본값: 서울시청)
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.978656), 
                level: 5 // 요구사항: 지도 확대 레벨 5
            };

            // 지도 및 서비스 모듈 초기화
            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places();
            infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // HTML5 Geolocation 브라우저 기능 확인 및 현재 위치 좌표 요청
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const userLatitude = position.coords.latitude;  // 위도 값 추출
                    const userLongitude = position.coords.longitude; // 경도 값 추출
                    const currentCoords = new kakao.maps.LatLng(userLatitude, userLongitude);
                    
                    // 지도의 중심점을 사용자 현재 위치로 변경
                    map.setCenter(currentCoords);
                    
                    // 현재 위치 지점에 마커 하나 생성
                    const currentMarker = new kakao.maps.Marker({
                        map: map,
                        position: currentCoords
                    });
                    
                    infoWindow.setContent('<div class="info-window">현재 내 위치</div>');
                    infoWindow.open(map, currentMarker);
                }, function(error) {
                    console.error("위치 권한 획득에 실패했습니다.", error);
                });
            }
        }

        // 검색 폼 전송 시 실행되는 장소 검색 요청 함수
        function searchPlaces() {
            const searchKeyword = document.getElementById('keyword').value;

            if (!searchKeyword.trim()) {
                alert('검색어를 입력해주세요.');
                return;
            }

            // 카카오 키워드 검색 서비스 호출
            placeService.keywordSearch(searchKeyword, placesSearchCallback);
        }

        // 키워드 검색 완료 시 시스템에서 자동 실행되는 콜백 함수
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 새로운 검색을 위해 기존 마커 및 리스트 화면 삭제
                clearPreviousResults();
                // 화면에 새로운 결과 리스트 및 마커 렌더링
                displaySearchResults(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 중 알 수 없는 시스템 오류가 발생했습니다.');
            }
        }

        // 지도에 남은 기존 마커와 팝업창을 완전히 청소하는 함수
        function clearPreviousResults() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null); // 지도에서 지우기
            }
            markers = []; // 배열 초기화
            infoWindow.close(); // 열려있는 정보창 닫기
        }

        // 결과를 지도 마커와 리스트 텍스트로 화면에 매핑하는 함수
        function displaySearchResults(places) {
            const listContainer = document.getElementById('placesList');
            const mapBounds = new kakao.maps.LatLngBounds(); // 마커들을 한눈에 담을 영역 계산기 생성
            
            listContainer.innerHTML = ''; // 이전 텍스트 리스트 비우기

            for (let i = 0; i < places.length; i++) {
                const placeCoords = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 지도 스페이스에 배치할 마커 생성
                const placeMarker = new kakao.maps.Marker({
                    position: placeCoords,
                    map: map
                });
                
                // 추후 일괄 삭제를 위해 전역 배열에 기록 유지
                markers.push(placeMarker);

                // 왼쪽 사이드바용 개별 행 엘리먼트 동적 빌드
                const listItem = document.createElement('div');
                listItem.className = 'result-item';
                listItem.innerHTML = `
                    <div class="place-title">${places[i].place_name}</div>
                    <div class="place-address">${places[i].road_address_name || places[i].address_name}</div>
                `;

                // 마커 및 리스트 클릭 시 출력될 정보 윈도우 마크업 정의
                const popupContent = `
                    <div class="info-window">
                        <strong>${places[i].place_name}</strong><br>
                        ${places[i].road_address_name || places[i].address_name}
                    </div>
                `;

                // 지도 내 마커 클릭 이벤트 설정
                kakao.maps.event.addListener(placeMarker, 'click', function() {
                    infoWindow.setContent(popupContent);
                    infoWindow.open(map, placeMarker);
                    map.panTo(placeCoords); // 해당 좌표로 부드럽게 시점 이동
                });

                // 사이드바 리스트 텍스트 클릭 이벤트 설정
                listItem.onclick = function() {
                    infoWindow.setContent(popupContent);
                    infoWindow.open(map, placeMarker);
                    map.panTo(placeCoords);
                };

                listContainer.appendChild(listItem);
                
                // 모든 결과가 화면 안에 안착하도록 좌표값 포함 확장
                mapBounds.extend(placeCoords);
            }

            // 루프 완료 후 최적의 시점과 레벨로 지도 자동 카메라 조정
            map.setBounds(mapBounds);
        }
    </script>
</body>
</html>
