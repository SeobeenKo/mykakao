<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 화면을 좌우 2분할하는 메인 레이아웃 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽 영역: 검색 및 리스트 공간 */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #dee2e6;
            z-index: 10;
        }

        /* 검색창 폼 wrapper */
        .search-box {
            padding: 15px;
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
        }

        .search-form {
            display: flex;
            gap: 5px;
        }

        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .search-button {
            padding: 8px 15px;
            background-color: #fee500; /* 카카오 테마 색상 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .search-button:hover {
            background-color: #fada0a;
        }

        /* 장소 목록 출력 공간 (내부 스크롤 활성화) */
        .result-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* 리스트 내 개별 아이템 스타일 */
        .result-item {
            padding: 12px;
            border-bottom: 1px solid #eeeeee;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .result-item:hover {
            background-color: #e9ecef;
        }

        .place-title {
            font-weight: bold;
            color: #333333;
            font-size: 15px;
        }

        .place-address {
            font-size: 12px;
            color: #666666;
            margin-top: 4px;
        }

        /* 오른쪽 영역: 지도 공간 */
        .map-container {
            flex: 1;
            height: 100%;
        }

        /* 지도 위 팝업(인포윈도우) 스타일 */
        .info-window {
            padding: 10px;
            font-size: 13px;
            line-height: 1.4;
        }
    </style>
    <!-- [연동 완료] 제공해주신 JavaScript 키를 적용한 라이브러리 스크립트 선언 -->
    <script type="text/javascript" src="kakao.com"></script>
</head>
<body>

    <div class="container">
        <!-- 왼쪽 영역: 검색창 구성 및 장소 목록 컨테이너 -->
        <div class="sidebar">
            <div class="search-box">
                <form class="search-form" onsubmit="searchPlaces(); return false;">
                    <input type="text" id="keyword" class="search-input" placeholder="검색할 키워드를 입력하세요" required>
                    <button type="submit" class="search-button">검색</button>
                </form>
            </div>
            <div id="placesList" class="result-list">
                <!-- 동적으로 생성된 검색 리스트가 들어가는 부분입니다 -->
            </div>
        </div>

        <!-- 오른쪽 영역: 카카오 지도 인스턴스 출력 -->
        <div id="map" class="map-container"></div>
    </div>

    <script>
        let map;             // 지도 인스턴스를 보관할 객체 변수
        let placeService;    // 카카오 장소 검색 API 통신 객체 변수
        let markers = [];    // 생성된 지도 마커들을 보관하고 삭제하기 위한 배열 변수
        let infoWindow;      // 지도 위에 렌더링될 정보창(팝업) 객체 변수

        // 스크립트 코드가 브라우저에 안전하게 내려받아진 이후 실행 보장
        kakao.maps.load(function() {
            initMap();
        });

        // 지도 기본 구조 초기화 및 Geolocation 권한 처리 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.978656), // 기본 초기화 중심 (서울시청)
                level: 5 // 구체적 지시사항: 지도 확대 레벨 5
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places();
            infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // 사용자 브라우저의 현재 위치 권한 처리 실행
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const userLatitude = position.coords.latitude;
                    const userLongitude = position.coords.longitude;
                    const currentCoords = new kakao.maps.LatLng(userLatitude, userLongitude);
                    
                    // 권한 획득 성공 시 지도의 중심을 현재 좌표로 이동
                    map.setCenter(currentCoords);
                    
                    // 현재 사용자 좌표 지점에 최초 기본 마커 고정
                    const currentMarker = new kakao.maps.Marker({
                        map: map,
                        position: currentCoords
                    });
                    
                    infoWindow.setContent('<div class="info-window">현재 내 위치</div>');
                    infoWindow.open(map, currentMarker);
                }, function(error) {
                    console.log("현재 위치 정보를 가져오지 못했습니다.", error);
                });
            }
        }

        // 검색 버튼 누르거나 Form Submit 발생 시 작동하는 검색 실행 함수
        function searchPlaces() {
            const searchKeyword = document.getElementById('keyword').value;

            if (!searchKeyword.trim()) {
                alert('검색어를 입력해 주세요.');
                return;
            }

            // 카카오 키워드 장소 검색 서비스 호출
            placeService.keywordSearch(searchKeyword, placesSearchCallback);
        }

        // 카카오 API 응답을 가공하는 콜백 처리 함수
        function placesSearchCallback(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 구체적 지시사항: 새로 검색할 때 기존 마커/팝업 제거 함수 작동
                clearPreviousResults();
                // 결과 데이터를 받아 마커 표시 및 좌측 목록 나열 함수 작동
                displaySearchResults(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 도중 에러가 발생했습니다.');
            }
        }

        // 지도 메모리에 쌓여 있는 이전 마커들과 인포윈도우를 지우는 청소 함수
        function clearPreviousResults() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null); // 지도 화면에서 제거
            }
            markers = []; // 마커 리스트 배열 완전 비우기
            infoWindow.close(); // 열려있는 정보 팝업창 닫기
        }

        // 가공된 장소 데이터를 마커와 사이드바 아이템으로 표출하는 화면 제어 함수
        function displaySearchResults(places) {
            const listContainer = document.getElementById('placesList');
            const mapBounds = new kakao.maps.LatLngBounds(); // 결과 마커들을 모두 포함시킬 영역 객체 생성
            
            listContainer.innerHTML = ''; // 기존 사이드바 결과 UI 비우기

            for (let i = 0; i < places.length; i++) {
                const placeCoords = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 구체적 지시사항: 검색 결과를 지도에 마커로 표시
                const placeMarker = new kakao.maps.Marker({
                    position: placeCoords,
                    map: map
                });
                
                // 새로운 검색 시 추적 제거할 수 있도록 전역 배열 변수에 보관
                markers.push(placeMarker);

                // 구체적 지시사항: 왼쪽 리스트에 장소 이름과 주소 나열할 아이템 태그 빌드
                const listItem = document.createElement('div');
                listItem.className = 'result-item';
                listItem.innerHTML = `
                    <div class="place-title">${places[i].place_name}</div>
                    <div class="place-address">${places[i].road_address_name || places[i].address_name}</div>
                `;

                // 정보창 내부 디자인용 팝업 템플릿 스트링 정의
                const popupContent = `
                    <div class="info-window">
                        <strong>${places[i].place_name}</strong><br>
                        ${places[i].road_address_name || places[i].address_name}
                    </div>
                `;

                // 구체적 지시사항: 마커 클릭 시 팝업 창 표출 기능 바인딩
                kakao.maps.event.addListener(placeMarker, 'click', function() {
                    infoWindow.setContent(popupContent);
                    infoWindow.open(map, placeMarker);
                    map.panTo(placeCoords); // 마커가 중앙에 가도록 화면 이동
                });

                // 구체적 지시사항: 리스트 아이템 클릭 시 동일하게 팝업 창 표출 기능 바인딩
                listItem.onclick = function() {
                    infoWindow.setContent(popupContent);
                    infoWindow.open(map, placeMarker);
                    map.panTo(placeCoords); // 해당 좌표가 중앙에 오도록 부드럽게 화면 이동
                };

                listContainer.appendChild(listItem);
                
                // 여러 결과 마커들이 한 화면 안에 알맞게 들어가도록 영역 축적 계산
                mapBounds.extend(placeCoords);
            }

            // 계산된 최적의 좌표 범위 바운더리로 지도 시점 및 레벨 일괄 재설정
            map.setBounds(mapBounds);
        }
    </script>
</body>
</html>
